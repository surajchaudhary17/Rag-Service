version: '3.9'

services:

  # =========================
  # SPRING BOOT BACKEND
  # =========================

  backend:
    build:
      context: .
    container_name: rag-backend

    ports:
      - "8080:8080"

    depends_on:
      - redis
      - qdrant

    environment:
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379

    restart: unless-stopped


  # =========================
  # REACT FRONTEND
  # =========================

  frontend:
    build:
      context: ./rag-ui
    container_name: rag-frontend

    ports:
      - "5173:5173"

    depends_on:
      - backend

    restart: unless-stopped


  # =========================
  # REDIS
  # =========================

  redis:
    image: redis:7-alpine
    container_name: redis

    ports:
      - "6379:6379"

    restart: unless-stopped


  # =========================
  # QDRANT VECTOR DB
  # =========================

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant

    ports:
      - "6333:6333"
      - "6334:6334"

    restart: unless-stopped